### NOTE on external components #####################################################
# when using external_components with local path, esphome resolves paths
# relative to main config
#
#####################################################################################

## For remote build (home assistant environment)
# external_components:
#   - source:
#       type: git
#       url: https://github.com/xeechou/esphome-magnetometer-water-gas-meter
#       ref: quadrature-meter
#       path: components
#     components: [sensor_update]
#
# sensor_update:

# For local build (esphome compile)
# external_components:
#   - source:
#       type: local
#       path: components
#     components: [sensor_update]
#
# sensor_update:

esphome:
  on_boot:
    priority: 600  # after HARDWARE, before DATA
    then:
      - lambda: |-
          // Wire up config (from YAML substitutions) and entity pointers once
          SensorUpdateConfig cfg {
            .sensor_update_interval_ms = ${sensor_update_interval_ms},
            .sample_rate_safety_factor = ${sample_rate_safety_factor},
            .reverse_flow             = ${reverse_flow},
            .burstmon_any_thresh      = ${burstmon_any_thresh},
            .burstmon_same_thresh     = ${burstmon_same_thresh},
            .tracker_decay_rate       = ${tracker_decay_rate},
            .min_span_multiplier      = ${min_span_multiplier},
            .max_span_multiplier      = ${max_span_multiplier},
          };
          SensorUpdateEntities ent {
            .errors                  = &id(errors),
            .samples                 = id(samples),
            .quarter_rotations_total = &id(quarter_rotations_total),
            .quarter_rotations_flow  = &id(quarter_rotations_flow),
            .magnet_span             = id(magnet_span),
            .disarm_s                = &id(disarm_s),
            .sensor_sample_rate      = id(sensor_sample_rate),
            .leak_detected           = id(leak_detected),
            .leak_warning            = id(leak_warning),
            .sensor_failure          = id(sensor_failure),
            .leak_trigger            = id(leak_trigger),
            // debugging code
            .rot_dir                 = id(rotating_directions),
            //.qmca                    = id(qmca_stat),
            //.qmcb                    = id(qmcb_stat),
          };
          sensor_update_init(cfg, ent);

#####################################################################################
## general config
#####################################################################################

# Enable logging
logger:
  level: INFO
  logs:
    sensor: INFO
    sensors: INFO

#####################################################################################
## water meter config
#####################################################################################
substitutions:
  # 1st i2c bus
  i2c_a_scl: GPIO21
  i2c_a_sda: GPIO17
  i2c_a_drdy: GPIO15
  # 2nd i2c bus
  i2c_b_scl: GPIO16
  i2c_b_sda: GPIO18
  i2c_b_drdy: GPIO3
  # frequencies
  i2c_address: '0x0D'
  
  i2c_bus_freq: '50kHz'
  sensor_update_interval_ms: '5'
  qmc_oversampling: '64x'
  hmc_oversampling: '8x'
  hide_qmc_readings: 'True'
  hide_quadrature_dir: 'True'
  hide_calibration_info: 'True'

  gpio_led: GPIO2

  reverse_flow: 'false'  # Flip this if your sensor order results in negative flow in normal
  sample_rate_safety_factor: '0.95'
  
  ### units and initial values
  # For water one of: CCF, ft³, gal, L, m³
  # For gas one of: CCF, ft³, m³
  volume_unit: 'L'
  volume_per_quarter_rotation_initial_value: '0.02026555'
  volume_init_total: '3003383.50'

  volume_unit_display: 'm³'
  volume_unit_display_multiplier: '0.0001f'  #convert from volume_unit to volume_unit_display


  # burstmon: performs pipe burst detection by monitoring sensors for abnormal behavior
  # Burst pipes pose an issue for detection, as the flow rates quickly get unreasonably large for our sample rates
  # Once the flow gets large enough, aliasing occurs and it may look like a smaller (or negative!) flow rate.
  # To defend against this, imagine that the steady-state of a burst pipe can alias and look like any flow,
  #   from -flow_max to +flow_max, uniformly-distributed.
  # An aggressive negative flowmon will catch 50% of these flows.
  # If a flowmon for the maximum expected flow is set at a quarter of the flow_max, that will catch 37.5% of the flows.
  # The remaining ~12.5% of the flows pose a challenge if they reach steady-state, since they look like normal flows.
  # Fortunately, pipe burst events do not instantly reach steady-state, so burstmon monitors for abnormal sensor
  # behavior that would indicate a very high flow rate.  Burstmon reacts on the timeframe of the sampling rate, rather
  # than the flow interval, so it can catch these sudden transients well before the burst hits steady-state.
  # As a side note: if the sensors are noisy and hysteresis gets too large, some exceptional flows hovering around a
  # multiple of flow_max will be hard to detect.  The dead zone can be calculated by 2*hysteresis/(max-min), so
  # approximately a tenth of flows that themselves are at some multiple of flow_max -- very small odds.
  # burstmon is only activated when the sample rate is above sample_rate_safety_factor of the target sample rate.
  burstmon_any_thresh: '3'  # maximum allowed sensor inversions in a row (0 disables)
                            # setting to 1 may also trigger at flows beyond flow_max/4
                            # setting at or beyond 2*burstmon_same_thresh effectively disables it
  burstmon_same_thresh: '2' # maximum allowed same-sensor inversions in a row (0 disables)
                            # setting to 1 may also trigger at flows beyond flow_max/2

  # Adaptive tracker parameters
  tracker_decay_rate: '0.0005'   # inward decay per 5ms sample ≈ 6 µT/min; increase for faster thermal tracking
  min_span_multiplier: '0.8'     # tracker window floor (fraction of magnet_span); keeps slow leaks detectable
  max_span_multiplier: '1.2'     # tracker window ceiling (fraction of magnet_span); limits spike damage
  calibration_seconds: '5'       # how long to run water during calibration

#####################################################################################
## i2c config
#####################################################################################

i2c:
  - id: i2c_a
    scl: ${i2c_a_scl}
    sda: ${i2c_a_sda}
    frequency: ${i2c_bus_freq}
    scan: False

  - id: i2c_b
    scl: ${i2c_b_scl}
    sda: ${i2c_b_sda}
    frequency: ${i2c_bus_freq}
    scan: False

#####################################################################################
## numbers and globals
#####################################################################################
number:
  - platform: template
    id: volume_per_quarter_rotation
    name: volume per quarter rotation
    entity_category: config
    mode: box
    min_value: 0
    max_value: 9999999
    step: 0.000000001
    initial_value: ${volume_per_quarter_rotation_initial_value}
    internal: true
    update_interval: never
    restore_value: true
    optimistic: true
    unit_of_measurement: ${volume_unit}
    icon: mdi:rotate-360
    on_value:
      then:
        - component.update: volume_per_quarter_rotation_sensor

globals:
  - id: errors
    type: long
    restore_value: no
    initial_value: '0'
  - id: led_level
    type: float
    restore_value: no
    initial_value: '1'
  - id: disarm_s
    type: float
    restore_value: no
    initial_value: '0'
  - id: samples
    type: int[2]
    restore_value: no
    initial_value: '{0,0}'
  ### restoring values
  - id: quarter_rotations_total
    type: long
    restore_value: yes
    initial_value: '0'
  - id: volume_init
    type: float
    restore_value: yes
    initial_value: ${volume_init_total}
  - id: quarter_rotations_flow
    type: long
    restore_value: no
    initial_value: '0'
  # [sensor-0 signal span, sensor-1 signal span]
  - id: magnet_span
    type: float[2]
    restore_value: yes
    initial_value: '{0, 0}'
  # Calibration scratch globals (written by calibrate button press, read by on_raw_value)
  - id: calibrating
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: calib_min
    type: float[2]
    restore_value: no
    initial_value: '{0, 0}'
  - id: calib_max
    type: float[2]
    restore_value: no
    initial_value: '{0, 0}'

#####################################################################################
## template sensors
#####################################################################################
sensor:
  - platform: template
    id: sensor_sample_rate
    name: Sample rate
    entity_category: diagnostic
    accuracy_decimals: 0
    device_class: frequency
    state_class: measurement
    unit_of_measurement: Hz
    filters:
      - or:
        - throttle: 60s
        - delta: 4

  - platform: template
    id: volume_total
    name: Total Volume ⁄${volume_unit_display}
    lambda: return id(quarter_rotations_total) * id(volume_per_quarter_rotation).state * ${volume_unit_display_multiplier};
    update_interval: 1s
    accuracy_decimals: 7
    device_class: water
    icon: mdi:water
    state_class: total
    unit_of_measurement: ${volume_unit_display}
    filters:
      - or:
        - throttle: 60s
        - delta: 0.01

  - platform: template
    id: total_rotations
    name: Total Rotations (inc_or_dec)
    lambda: !lambda 'return id(quarter_rotations_total) / 4.0f;'
    entity_category: diagnostic
    internal: false
    update_interval: 1s
    accuracy_decimals: 2
    state_class: measurement     #because we may not be actually increasing.
    unit_of_measurement: rot
    icon: mdi:counter
    filters:
      - delta: 0.25

  # TODO: remove later
  # - platform: template
  #   id: qmca_stat
  #   name: QMC A stat                #1 or 0
  #   entity_category: diagnostic
  #   internal: false
  #   accuracy_decimals: 0
  #   state_class: measurement
  #   icon: mdi:counter

  # - platform: template
  #   id: qmcb_stat
  #   name: QMC B stat                #1 or 0
  #   entity_category: diagnostic
  #   internal: false
  #   accuracy_decimals: 0
  #   state_class: measurement
  #   icon: mdi:counter

  - platform: template
    id: rotating_directions
    name: "Rotating directions"
    entity_category: diagnostic
    unit_of_measurement: rot
    icon: mdi:counter
    internal: ${hide_quadrature_dir}
    #NOTE: do not include filters

  # read only sensor for displaying the rotation volume
  - platform: template
    id: volume_per_quarter_rotation_sensor
    name: Volume per quarter rotation Precised
    lambda: !lambda 'return id(volume_per_quarter_rotation).state;'
    update_interval: 60s
    accuracy_decimals: 7
    unit_of_measurement: ${volume_unit}


#####################################################################################
## qmc5883l
#####################################################################################

  - platform: qmc5883l
    id : qmc_a
    i2c_id: i2c_a
    address: ${i2c_address}
    update_interval: ${sensor_update_interval_ms}ms
    oversampling: ${qmc_oversampling}
    field_strength_z: 
      id: z_a
      name: qmc_a magnet field strength
      entity_category: diagnostic
      internal: ${hide_qmc_readings}
      on_raw_value:
        then:
          - lambda: |-
              if (id(calibrating)) {
                id(calib_min)[0] = std::min(id(calib_min)[0], x);
                id(calib_max)[0] = std::max(id(calib_max)[0], x);
              }
              id(sensor_update_script).execute(0, x);
      filters:
        - delta: 5
        - throttle: 500ms

  - platform: qmc5883l
    id : qmc_b
    i2c_id: i2c_b
    address: ${i2c_address}
    update_interval: ${sensor_update_interval_ms}ms
    oversampling: ${qmc_oversampling}
    field_strength_z: 
      id: z_b
      name: qmc_b magnet field strength
      internal: ${hide_qmc_readings}
      entity_category: diagnostic
      on_raw_value:
        then:
          - lambda: |-
              if (id(calibrating)) {
                id(calib_min)[1] = std::min(id(calib_min)[1], x);
                id(calib_max)[1] = std::max(id(calib_max)[1], x);
              }
              id(sensor_update_script).execute(1, x);
      filters:
        - delta: 5
        - throttle: 500ms



#####################################################################################
## binary/text sensors
#####################################################################################

binary_sensor:
  - platform: template
    id: leak_detected
    name: Leak detected
    device_class: problem

  - platform: template
    id: leak_warning
    name: Leak imminent
    device_class: problem

  - platform: template
    id: sensor_failure
    name: Sensor failure
    device_class: problem
    entity_category: diagnostic

text_sensor:
  - platform: template
    id: leak_trigger
    name: Leak trigger
    entity_category: diagnostic

  - platform: template             # debugging purpose, delete later
    id: hyst_sensor
    name: hysteresis
    entity_category: diagnostic    

  - platform: template
    id: qcal_a
    name: qcal qmc_a
    entity_category: diagnostic
    icon: mdi:magnet
    update_interval: 1s
    internal: ${hide_calibration_info}
    lambda: |-
      char buf[80];
      snprintf(buf, sizeof(buf), "span=%.1f tmin=%.1f tmax=%.1f",
               id(magnet_span)[0],
               sensor_update_get_track_min(0),
               sensor_update_get_track_max(0));
      return std::string(buf);

  - platform: template
    id: qcal_b
    name: qcal qmc_b
    entity_category: diagnostic
    icon: mdi:magnet
    update_interval: 1s
    internal: ${hide_calibration_info}
    lambda: |-
      char buf[80];
      snprintf(buf, sizeof(buf), "span=%.1f tmin=%.1f tmax=%.1f",
               id(magnet_span)[1],
               sensor_update_get_track_min(1),
               sensor_update_get_track_max(1));
      return std::string(buf);

#####################################################################################
## bottons
#####################################################################################

button:
  - platform: template
    id: calibrate
    name: Calibrate sensors
    entity_category: config
    icon: mdi:tune
    on_press:
      then:
        - lambda: |-
            id(magnet_span)[0] = 0;
            id(magnet_span)[1] = 0;
            sensor_update_reset_trackers(0);
            sensor_update_reset_trackers(1);
            id(calib_min)[0] = std::numeric_limits<float>::max();
            id(calib_max)[0] = std::numeric_limits<float>::lowest();
            id(calib_min)[1] = std::numeric_limits<float>::max();
            id(calib_max)[1] = std::numeric_limits<float>::lowest();
            id(calibrating) = true;
            id(hyst_sensor).publish_state("Calibrating — run water now...");
            ESP_LOGI("calibration", "Calibration started, running for ${calibration_seconds}s");
        - delay: ${calibration_seconds}s
        - lambda: |-
            id(calibrating) = false;
            const float min_required = 10.0f;
            bool ok = true;
            for (int i = 0; i < 2; i++) {
              float span = id(calib_max)[i] - id(calib_min)[i];
              if (span < min_required) {
                ESP_LOGW("calibration", "Sensor %d span %.1f too small (need %.0f) — is water flowing?", i, span, min_required);
                ok = false;
                continue;
              }
              id(magnet_span)[i] = span;
              sensor_update_reset_trackers(i);
              ESP_LOGI("calibration", "Sensor %d: min=%.1f max=%.1f span=%.1f", i, id(calib_min)[i], id(calib_max)[i], span);
            }
            if (ok) {
              id(sensor_failure).publish_state(false);
              id(hyst_sensor).publish_state("Calibration OK");
            } else {
              id(hyst_sensor).publish_state("Calibration FAILED: low signal");
            }

#####################################################################################
## API service
#####################################################################################
api:
  actions:
    - action: set_curr_total  # recalculate volume_per_quarter_rotation so current total matches curr_total
      variables:
        curr_total: float
      then:
        - number.set:
            id: volume_per_quarter_rotation
            value: !lambda |-
              return ( (curr_total / ${volume_unit_display_multiplier}) - id(volume_init) ) / (float)id(quarter_rotations_total);

    - action: set_init_total  # reset rotation counter and set the baseline volume offset
      variables:
        init_total: float
      then:
        - globals.set:
            id: quarter_rotations_total
            value: '0'
        - globals.set:
            id: volume_init
            value: !lambda |-
              return init_total / ${volume_unit_display_multiplier};

#####################################################################################
## sensor update script
#####################################################################################
script:
  - id: sensor_update_script
    parameters:
      sensor: int
      value: float
    then:
      - lambda: |-
          sensor_update(sensor, value);
